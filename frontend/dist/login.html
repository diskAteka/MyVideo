<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - MyVideo</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/pages/login.css">
    <link rel="stylesheet" href="styles/icons.css">
</head>
<body class="auth-page">
    <div class="auth-card card">
        <div class="auth-card__header">
            <h1 class="auth-card__title">
            <span class="icon icon--xl"></span>
            MyVideo
        </h1>
            <p class="auth-card__subtitle">Войдите в свой аккаунт для доступа к видео</p>
        </div>

        <div class="auth-card__body">
            <div id="message" class="alert"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-group__label" for="login">Логин или Email</label>
                    <div class="input-group">
                        <span class="input-group__icon icon"><!-- TODO: иконка пользователя --></span>
                        <input type="text" id="login" name="login" class="input"
                               placeholder="Введите логин или email" required autofocus>
                    </div>
                    <div class="error-text" id="loginError"></div>
                </div>

                <div class="form-group">
                    <label class="form-group__label" for="password">Пароль</label>
                    <div class="input-group">
                        <span class="input-group__icon icon"><!-- TODO: иконка замка --></span>
                        <input type="password" id="password" name="password" class="input"
                               placeholder="Введите пароль" required>
                        <button type="button" class="input-group__toggle" id="togglePassword" aria-label="Показать пароль">
                            <span class="icon"><!-- TODO: иконка глаза --></span>
                        </button>
                    </div>
                    <div class="error-text" id="passwordError"></div>
                </div>

                <button type="submit" class="btn btn--accent btn--block btn--lg" id="submitBtn">
                    <span id="btnText">Войти</span>
                </button>
            </form>

            <div class="auth-card__footer">
                <a href="register.html">Создать аккаунт</a>
                <a href="index.html">На главную</a>
            </div>
        </div>
    </div>

    <script type="module" src="scripts/pages/login.js"></script>
</body>
</html>
