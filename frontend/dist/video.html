<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр видео - MyVideo</title>
    <!-- Video.js (функциональная зависимость) -->
    <link href="https://vjs.zencdn.net/8.0.4/video-js.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/pages/video.css">
    <link rel="stylesheet" href="styles/icons.css">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="container">
            <div class="header__content">
                <a href="index.html" class="logo" aria-label="На главную">
                    <span class="logo__icon icon"><!-- TODO: иконка логотипа --></span>
                </a>

                <div class="header__actions">
                    <a href="index.html" class="btn btn--ghost btn--pill">
                        <span class="icon"><!-- TODO: иконка стрелки --></span>
                        <span>На главную</span>
                    </a>
                    <div class="header__auth"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="main-content">
        <div class="container">

            <!-- Сообщения -->
            <div id="message" class="alert"></div>

            <!-- Видеоплеер -->
            <div class="video-player">
                <video-js id="videoPlayer"
                          class="video-js vjs-theme-forest vjs-big-play-centered"
                          controls
                          preload="auto"
                          width="100%"
                          height="400">
                    <p class="vjs-no-js">
                        Для просмотра видео включите JavaScript или обновите браузер
                    </p>
                </video-js>
            </div>

            <!-- Информация о видео -->
            <section class="video-info panel">
                <h1 id="videoTitle" class="video-info__title">Загрузка...</h1>

                <div class="video-page__meta">
                    <div class="video-stats">
                        <div class="video-stat">
                            <span id="viewsCount">0</span>
                            <span>просмотров</span>
                        </div>
                        <div class="video-stat">
                            <span id="likesCount">0</span>
                            <span>лайков</span>
                        </div>
                        <div class="video-stat">
                            <span id="dislikesCount">0</span>
                            <span>дизлайков</span>
                        </div>
                    </div>

                    <div class="reactions">
                        <button id="likeBtn" class="reaction-btn reaction-btn--like">
                            <span class="icon"><!-- TODO: иконка лайка --></span>
                            <span>Лайк</span>
                        </button>
                        <button id="dislikeBtn" class="reaction-btn reaction-btn--dislike">
                            <span class="icon"><!-- TODO: иконка дизлайка --></span>
                            <span>Дизлайк</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Комментарии -->
            <section class="comments">
                <h2 class="comments__title section-title">
                    <span class="icon"><!-- TODO: иконка комментариев --></span>
                    <span id="commentsCount">Комментарии (0)</span>
                </h2>

                <!-- Форма комментария -->
                <form id="commentForm" class="comment-form panel">
                    <textarea id="commentInput"
                              class="textarea comment-form__input"
                              placeholder="Добавить комментарий..."
                              maxlength="1000"></textarea>
                    <button type="button" id="commentSubmitBtn" class="btn btn--primary btn--pill comment-form__submit">
                        Отправить
                    </button>
                </form>

                <!-- Список комментариев -->
                <div id="commentsList" class="comments__list">
                    <!-- Комментарии загружаются сюда -->
                </div>

                <!-- Индикатор загрузки комментариев -->
                <div id="commentsLoading" class="state">
                    <span class="spinner spinner--lg"></span>
                    <p>Загрузка комментариев...</p>
                </div>
            </section>

        </div>
    </main>

    <!-- Video.js скрипт -->
    <script src="https://vjs.zencdn.net/8.0.4/video.min.js"></script>

    <script type="module" src="scripts/pages/video.js"></script>
</body>
</html>
